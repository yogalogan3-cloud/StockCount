<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#F5F0EB"/>
<title>Stock Counter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F0EB; font-family: Georgia, serif; color: #3D1F0F; }
button { font-family: Georgia, serif; cursor: pointer; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
#wrap { max-width: 480px; margin: 0 auto; }

/* HEADER */
#hdr { background: #FFF8F4; border-bottom: 1px solid #E8DDD6; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 99; }
#hdr h1 { font-size: 18px; color: #3D1F0F; }
#hdr .sub { font-size: 11px; color: #8B6A5A; margin-top: 2px; }

/* TABS */
#tabs { display: flex; background: #FFF8F4; border-bottom: 1px solid #E8DDD6; overflow-x: auto; -webkit-overflow-scrolling: touch; }
#tabs button { flex-shrink: 0; padding: 11px 16px; background: none; border: none;
  border-bottom: 2px solid transparent; font-size: 13px; color: #8B6A5A; cursor: pointer;
  font-family: Georgia, serif; white-space: nowrap; }
#tabs button.active { font-weight: 700; }

/* ITEMS */
#content { padding: 12px 14px 80px; }
.item { background: #FFF3EE; border: 1px solid #E8DDD6; border-radius: 14px;
  padding: 14px; margin-bottom: 10px; }
.item-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.item-name { font-size: 15px; font-weight: 600; color: #3D1F0F; }
.item-bottom { display: flex; align-items: center; justify-content: space-between; }
.controls { display: flex; align-items: center; gap: 8px; }
.btn-dec { width: 38px; height: 38px; border-radius: 50%; background: #FFE8E8;
  border: 1px solid #FF444444; color: #FF4444; font-size: 24px;
  display: flex; align-items: center; justify-content: center; }
.cnt-input { width: 50px; background: #F0E8E2; border: 1px solid #D4C4BA;
  border-radius: 8px; color: #3D1F0F; font-size: 20px; font-weight: 700;
  text-align: center; padding: 6px 2px; font-family: monospace; }
.btn-inc { width: 38px; height: 38px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 24px;
  border-width: 1px; border-style: solid; }
.btn-remove { background: none; border: 1px solid #D4C4BA; border-radius: 6px;
  color: #8B6A5A; font-size: 11px; padding: 5px 10px; }
.add-btn { width: 100%; background: none; border: 1px dashed #252525;
  border-radius: 12px; color: #7A5A4A; font-size: 13px; padding: 13px; margin-top: 4px; }
.text-input { background: #F0E8E2; border: 1px solid #D4C4BA; border-radius: 8px;
  color: #3D1F0F; font-size: 14px; padding: 10px 12px; font-family: Georgia, serif; width: 100%; }
.row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }

/* SUMMARY */
.s-card { flex: 1; background: #FFF3EE; border: 1px solid #E8DDD6;
  border-radius: 12px; padding: 12px 8px; text-align: center; }
.s-total { font-size: 22px; font-weight: 700; margin: 4px 0 2px; }
.s-label { font-size: 11px; color: #8B6A5A; text-transform: capitalize; }
.action-btn { width: 100%; border-radius: 10px; font-size: 13px; font-weight: 700;
  padding: 11px; margin-bottom: 8px; }

/* TOAST */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #F0E8E2; border: 1px solid #D4C4BA; border-radius: 12px; padding: 12px 18px;
  font-size: 13px; color: #3D1F0F; display: none; z-index: 200;
  max-width: calc(100% - 32px); text-align: center; }
</style>
</head>

// ── State ─────────────────────────────────────────────────────────────────────
var STATE = loadState();

function defaultState() {
  return {
    tab: "soups",
    cats: JSON.parse(JSON.stringify(DEFAULT_CATS)),
    items: JSON.parse(JSON.stringify(DEFAULT_ITEMS)),
    editing: null, editName: "",
    counts: {},
    removed: [],
    adding: null,
    newName: "",
    addingCat: false,
    newCatName: ""
  };
}

function loadState() {
  try {
    var s = localStorage.getItem("sc_v9");
    if (s) return JSON.parse(s);
  } catch(e) {}
  return defaultState();
}

function save() {
  try { localStorage.setItem("sc_v9", JSON.stringify(STATE)); } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function getCat(id) {
  for (var i = 0; i < STATE.cats.length; i++) if (STATE.cats[i].id === id) return STATE.cats[i];
  return null;
}

function allItems(catId) {
  // STATE.items is the single source of truth (seeded from DEFAULT_ITEMS on first load)
  var list = STATE.items[catId] || [];
  return list.filter(function(i) { return STATE.removed.indexOf(i.id) < 0; });
}

function catTotal(catId) {
  var items = allItems(catId), s = 0;
  for (var i = 0; i < items.length; i++) s += (STATE.counts[items[i].id] || 0);
  return s;
}

function grandTotal() {
  var s = 0;
  for (var i = 0; i < STATE.cats.length; i++) s += catTotal(STATE.cats[i].id);
  return s;
}

// ── Render ────────────────────────────────────────────────────────────────────
function showTab(tab) {
  STATE.tab = tab;
  STATE.adding = null;
  STATE.newName = "";
  STATE.addingCat = false;
  STATE.newCatName = "";
  save();
  render();
}

function render() {
  renderTabs();
  var c = document.getElementById("content");
  if (STATE.tab === "summary") {
    c.innerHTML = renderSummary();
  } else {
    var cat = getCat(STATE.tab);
    if (cat) c.innerHTML = renderItems(cat);
  }
}

function renderTabs() {
  var html = "";
  for (var i = 0; i < STATE.cats.length; i++) {
    var cat = STATE.cats[i];
    var active = STATE.tab === cat.id;
    var total = catTotal(cat.id);
    html += "<button onclick=\"showTab('" + cat.id + "')\" id=\"tab-" + cat.id + "\"" +
      " style=\"border-bottom-color:" + (active ? cat.color : "transparent") + ";" +
      "color:" + (active ? cat.color : "#555") + ";" +
      "font-weight:" + (active ? "700" : "400") + "\">" +
      cat.emoji + " " + cat.name + " (" + total + ")</button>";
  }
  // Add category button
  html += "<button onclick=\"startAddCat()\" style=\"border-bottom-color:transparent;color:#444;font-size:13px\">＋ Category</button>";
  html += "<button onclick=\"showTab('summary')\" id=\"tab-summary\" style=\"border-bottom-color:" + (STATE.tab === "summary" ? "#888" : "transparent") + ";color:" + (STATE.tab === "summary" ? "#AAA" : "#444") + "\">📊</button>";
  document.getElementById("tabs").innerHTML = html;
}

function renderItems(cat) {
  var items = allItems(cat.id);
  var col = cat.color;
  var html = "";

  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var count = STATE.counts[item.id] || 0;
    var isEditing = STATE.editing === item.id;
    html += "<div class=\"item\" id=\"card-" + item.id + "\">";
    if (isEditing) {
      // Inline edit form
      html += "<div class=\"row\" style=\"margin-bottom:0\">";
      html += "<input class=\"text-input\" id=\"edit-input\" type=\"text\" value=\"" + item.name + "\" oninput=\"STATE.editName=this.value\" onkeydown=\"if(event.key==='Enter')saveEdit('" + item.id + "')\" style=\"flex:1\">";
      html += "<button style=\"background:" + col + ";border:none;border-radius:8px;color:#FFF8F4;font-size:13px;font-weight:700;padding:10px 14px;flex-shrink:0\" onclick=\"saveEdit('" + item.id + "')\">Save</button>";
      html += "<button style=\"background:#F0E8E2;border:1px solid #D4C4BA;border-radius:8px;color:#8B6A5A;font-size:13px;padding:10px 12px;flex-shrink:0\" onclick=\"STATE.editing=null;render()\">✕</button>";
      html += "</div>";
    } else {
      html += "<div class=\"item-top\"><span style=\"font-size:24px;flex-shrink:0\">" + item.emoji + "</span>";
      html += "<div style=\"flex:1\"><div class=\"item-name\">" + item.name + "</div></div>";
      html += "<button onclick=\"startEdit('" + item.id + "','" + item.name.replace(/'/g, "\\'") + "')\" style=\"background:none;border:1px solid #D4C4BA;border-radius:6px;color:#8B6A5A;font-size:11px;padding:4px 8px;flex-shrink:0\">✏️</button>";
      html += "</div>";
      html += "<div class=\"item-bottom\"><div class=\"controls\">";
      html += "<button class=\"btn-dec\" onclick=\"upd('" + item.id + "',-1)\">−</button>";
      html += "<input class=\"cnt-input\" type=\"number\" min=\"0\" value=\"" + count + "\" onchange=\"sct('" + item.id + "',this.value)\"/>";
      html += "<button class=\"btn-inc\" style=\"background:" + col + "18;border-color:" + col + "44;color:" + col + "\" onclick=\"upd('" + item.id + "',1)\">+</button>";
      html += "</div>";
      html += "<button class=\"btn-remove\" onclick=\"removeItem('" + item.id + "','" + item.name.replace(/'/g, "\\'") + "')\">✕ remove</button>";
      html += "</div>";
    }
    html += "</div>";
  }

  // Add item form
  if (STATE.adding === cat.id) {
    html += "<div class=\"row\">";
    html += "<input class=\"text-input\" id=\"new-input\" type=\"text\" placeholder=\"Item name...\" oninput=\"STATE.newName=this.value\" onkeydown=\"if(event.key==='Enter')addItem('" + cat.id + "')\">";
    html += "<button style=\"background:" + col + ";border:none;border-radius:8px;color:#0D0D0D;font-size:13px;font-weight:700;padding:10px 14px;flex-shrink:0\" onclick=\"addItem('" + cat.id + "')\">Add</button>";
    html += "<button style=\"background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px;color:#555;font-size:13px;padding:10px 12px;flex-shrink:0\" onclick=\"STATE.adding=null;render()\">✕</button>";
    html += "</div>";
  } else {
    html += "<button class=\"add-btn\" onclick=\"STATE.adding='" + cat.id + "';render();setTimeout(function(){var e=document.getElementById('new-input');if(e)e.focus();},50)\">+ Add item</button>";
  }

  // Remove entire category (only custom categories)
  if (!cat.builtin) {
    html += "<div style=\"margin-top:20px;padding-top:16px;border-top:1px solid #1E1E1E\">";
    html += "<button onclick=\"removeCat('" + cat.id + "')\" style=\"width:100%;background:#1A0A0A;border:1px solid #FF444444;border-radius:10px;color:#FF4444;font-size:13px;padding:11px\">🗑 Remove \"" + cat.name + "\" category</button>";
    html += "</div>";
  }

  return html;
}

function renderSummary() {
  var html = "<div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px\">";
  for (var i = 0; i < STATE.cats.length; i++) {
    var cat = STATE.cats[i];
    html += "<div class=\"s-card\" style=\"min-width:80px\">";
    html += "<div style=\"font-size:20px\">" + cat.emoji + "</div>";
    html += "<div class=\"s-total\" style=\"color:" + cat.color + "\">" + catTotal(cat.id) + "</div>";
    html += "<div class=\"s-label\">" + cat.name + "</div>";
    html += "</div>";
  }
  html += "</div>";
  html += "<div style=\"background:#FFF3EE;border:1px solid #E8DDD6;border-radius:12px;padding:16px;margin-bottom:16px;text-align:center\">";
  html += "<div style=\"font-size:12px;color:#8B6A5A;margin-bottom:4px\">Grand Total</div>";
  html += "<div style=\"font-size:40px;font-weight:700;color:#3D1F0F\">" + grandTotal() + "</div>";
  html += "</div>";

  // Submit button
  html += "<button class=\"action-btn\" style=\"background:#8B4513;border:none;color:#FFF8F4;font-size:15px;margin-bottom:16px\" onclick=\"submitCount()\">📤 Submit to Google Sheets & Telegram</button>";
  html += "<div style=\"height:1px;background:#E8DDD6;margin-bottom:12px\"></div>";
  html += "<button class=\"action-btn\" style=\"background:#E8F5F0;border:1px solid #00B89455;color:#2E8B57\" onclick=\"restoreAll()\">↩️ Restore Removed Items</button>";
  html += "<button class=\"action-btn\" style=\"background:#FFE8E8;border:1px solid #FF444455;color:#CC2200\" onclick=\"resetAll()\">🔄 Reset All Counts to Zero</button>";
  return html;
}

// ── Add Category ──────────────────────────────────────────────────────────────
function startAddCat() {
  STATE.tab = "__addcat__";
  save();
  renderTabs();
  var c = document.getElementById("content");
  var html = "<div style=\"padding:8px 0\">";
  html += "<div style=\"font-size:14px;color:#8B6A5A;margin-bottom:14px\">New category name:</div>";
  html += "<div class=\"row\">";
  html += "<input class=\"text-input\" id=\"cat-input\" type=\"text\" placeholder=\"e.g. Drinks, Cakes...\" oninput=\"STATE.newCatName=this.value\" onkeydown=\"if(event.key==='Enter')addCat()\">";
  html += "</div>";
  html += "<button onclick=\"addCat()\" style=\"width:100%;background:#4ECDC4;border:none;border-radius:10px;color:#0D0D0D;font-size:14px;font-weight:700;padding:12px;margin-bottom:8px\">＋ Add Category</button>";
  html += "<button onclick=\"showTab('soups')\" style=\"width:100%;background:#F0E8E2;border:1px solid #D4C4BA;border-radius:10px;color:#555;font-size:13px;padding:11px\">Cancel</button>";
  html += "</div>";
  c.innerHTML = html;
  setTimeout(function() { var e = document.getElementById("cat-input"); if(e) e.focus(); }, 50);
}

function addCat() {
  var name = (STATE.newCatName || "").trim();
  if (!name) { toast("Please enter a category name"); return; }
  var id = "cat_" + Date.now();
  var color = CAT_COLORS[STATE.cats.length % CAT_COLORS.length];
  var emojis = ["📦","🥗","🍰","🥤","🫙","🍱","🧁","🍜"];
  var emoji = emojis[STATE.cats.length % emojis.length];
  STATE.cats.push({ id: id, name: name, emoji: emoji, color: color, builtin: false });
  STATE.items[id] = [];
  STATE.newCatName = "";
  save();
  showTab(id);
}

function removeCat(catId) {
  if (!confirm("Remove this category and all its items?")) return;
  STATE.cats = STATE.cats.filter(function(c) { return c.id !== catId; });
  delete STATE.items[catId];
  save();
  showTab(STATE.cats.length > 0 ? STATE.cats[0].id : "summary");
}

function startEdit(id, name) {
  STATE.editing = id;
  STATE.editName = name;
  render();
  setTimeout(function() {
    var e = document.getElementById("edit-input");
    if (e) { e.focus(); e.select(); }
  }, 50);
}

function saveEdit(id) {
  var name = (STATE.editName || "").trim();
  if (!name) return;
  for (var cat in STATE.items) {
    var list = STATE.items[cat];
    for (var i = 0; i < list.length; i++) {
      if (list[i].id === id) { list[i].name = name; break; }
    }
  }
  STATE.editing = null;
  STATE.editName = "";
  save();
  render();
  toast("Renamed to \"" + name + "\"");
}

// ── Item Actions ──────────────────────────────────────────────────────────────
function upd(id, delta) {
  var cur = STATE.counts[id] || 0;
  STATE.counts[id] = Math.max(0, cur + delta);
  save();
  var card = document.getElementById("card-" + id);
  if (card) {
    card.style.background = "#FFE8DC";
    setTimeout(function() { card.style.background = "#FFF3EE"; }, 200);
    var inp = card.querySelector(".cnt-input");
    if (inp) inp.value = STATE.counts[id];
  }
  renderTabs();
}

function sct(id, val) {
  var n = parseInt(val, 10);
  if (isNaN(n) || n < 0) return;
  STATE.counts[id] = n;
  save();
  renderTabs();
}

function addItem(catId) {
  var name = (STATE.newName || "").trim();
  if (!name) return;
  var id = "i_" + Date.now();
  if (!STATE.items[catId]) STATE.items[catId] = [];
  STATE.items[catId].push({ id: id, name: name, emoji: "⭐" });
  STATE.counts[id] = 0;
  STATE.newName = "";
  STATE.adding = null;
  save();
  render();
}

function removeItem(id, name) {
  STATE.removed.push(id);
  save();
  render();
  toast('"' + name + '" removed. Restore via 📊 Summary.');
}

function restoreAll() {
  STATE.removed = [];
  save();
  render();
  toast("All items restored!");
}

function resetAll() {
  if (!confirm("Reset all counts to zero?")) return;
  STATE.counts = {};
  save();
  render();
}

// ── Google Sheets + Telegram Submit ──────────────────────────────────────────
var WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzW8crE-s_ePcHUxf70Tj1pqpTMn-AwfqllvdA5NNYvRSC2zfr8k5u37_BEucRrnKw4/exec";

function submitCount() {
  if (grandTotal() === 0) {
    toast("⚠️ No counts to submit yet!");
    return;
  }

  // Build items list
  var items = [];
  for (var ci = 0; ci < STATE.cats.length; ci++) {
    var cat = STATE.cats[ci];
    var catItems = allItems(cat.id);
    for (var ii = 0; ii < catItems.length; ii++) {
      var item = catItems[ii];
      var count = STATE.counts[item.id] || 0;
      if (count > 0) {
        items.push({ category: cat.name, name: item.name, count: count });
      }
    }
  }

  toast("📤 Submitting...");

  var payload = JSON.stringify({ action: "submit", submitter: "Shobah", items: items });

  fetch(WEBAPP_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: payload
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        toast("✅ Submitted! Google Sheets & Telegram updated.");
      } else {
        toast("⚠️ Error: " + (data.error || "Unknown error"));
      }
    })
    .catch(function(err) {
      toast("⚠️ Could not connect. Check your internet.");
    });
}

var toastTimer;
function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.style.display = "none"; }, 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
